name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create dist folder
        run: mkdir dist

      - name: Create placeholder EXE
        run: echo "UltimaDisplaysTemplate EXE placeholder" > dist/UltimaDisplaysTemplate.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: UltimaDisplaysTemplate
          path: dist/UltimaDisplaysTemplate.exe
