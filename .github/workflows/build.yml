name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install pkg
        run: npm install -g pkg

      - name: Build EXE
        run: pkg . --out-path dist

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: UltimaDisplaysTemplate
          path: dist/*.exe
